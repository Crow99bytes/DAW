<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Ejercicio 1</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <style>
        :root {
            margin: 1em;
        }
        * {
            box-sizing: border-box;
        }
        .container * {
            border: 1px solid black;

        }
        .row {
            min-height: 7em;
        }
        .main {
            height: 17em;
        }
    </style>
</head>
<body>
    <div class="container ">
        <div class="row">
            <div class="col-lg-6 bg-danger nav ">Div 1</div>
            <div class="col-lg-6 bg-danger nav">Div 2</div>
        </div>
        <div class="row">
            <div class="col-lg-12 bg-success main">Div 3</div>
        </div>
        <div class="row">
            <div class="col-lg-4 bg-primary small">Div 4</div>
            <div class="col-lg-4 bg-primary small">Div 5</div>
            <div class="col-lg-4 bg-primary small">Div 6</div>
        </div>
        <div class="row">
            <div class="col-lg-3 col-sm-6 bg-secondary foot">Div 7</div>
            <div class="col-lg-3 col-sm-6 bg-secondary foot d-none d-sm-block">Div 8</div>
            <div class="col-lg-3 col-sm-6 bg-secondary foot d-none d-sm-block">Div 9</div>
            <div class="col-lg-3 col-sm-6 bg-secondary foot d-none d-sm-block">Div 10</div>
        </div>
    </div>
</body>
</html>
